<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intelligence Plant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #28a745;
            --dark-green: #1e7e34;
            --soft-green: #e8f5e9;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%), 
                        url('https://www.transparenttextures.com/patterns/leaf.png');
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: linear-gradient(to right, #28a745, #20c997) !important;
            padding: 2rem !important;
            border: none;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
            border-color: var(--primary-green);
        }

        .btn-login {
            background: var(--primary-green);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--dark-green);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .footer-links a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .demo-box {
            background-color: var(--soft-green);
            border-radius: 10px;
            padding: 15px;
            border: 1px dashed var(--primary-green);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card login-card shadow-lg">
                    <div class="card-header text-white text-center">
                        <i class="fas fa-seedling fa-3x mb-3"></i>
                        <h4 class="mb-0 fw-bold">Intelligence Plant</h4>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center fw-bold mb-4" style="color: #333;">Bienvenido</h2>
                        
                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <div class="mb-4">
                                <label for="correo" class="form-label text-muted">
                                    <i class="fas fa-envelope me-2"></i>Correo Electrónico
                                </label>
                                <input type="email" class="form-control" id="correo" name="correo" 
                                       placeholder="nombre@ejemplo.com" required autofocus>
                            </div>
                            
                            <div class="mb-4">
                                <label for="contrasenia" class="form-label text-muted">
                                    <i class="fas fa-lock me-2"></i>Contraseña
                                </label>
                                <input type="password" class="form-control" id="contrasenia" 
                                       name="contrasenia" placeholder="********" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-login">
                                    <i class="fas fa-sign-in-alt me-2"></i>Ingresar al Sistema
                                </button>
                            </div>
                        </form>

                        <div class="footer-links text-center mt-4">
                            <p class="mb-2">¿Nuevo cliente? 
                                <a href="{{ url_for('auth.registro_cliente') }}">Crea una cuenta</a>
                            </p>
                            <p class="small">
                                <a href="#" class="text-muted">¿Olvidaste tu contraseña?</a>
                            </p>
                        </div>
                        
                        <div class="demo-box text-center mt-4">
                            <p class="text-muted mb-0 small">
                                <i class="fas fa-info-circle me-1 text-success"></i>
                                <strong>Acceso Demo:</strong><br>
                                admin@plantas.com / Admin123!
                            </p>
                        </div>
                    </div>

                    <div class="card-footer bg-white border-0 text-center pb-4">
                        <small class="text-muted">
                            &copy; 2026 Intelligence Plant System
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
